<!doctype html>
<html lang="es">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    
    <!-- SEO Meta Tags -->
    <title>Sistema POS Boutique | Software de Punto de Venta para Tiendas de Ropa</title>
    <meta name="description" content="Sistema POS profesional para boutiques de ropa. Gestión de inventario, ventas rápidas, reportes y suscripciones mensuales. Acceso desde navegador." />
    <meta name="keywords" content="POS, punto de venta, boutique, ropa, inventario, software, tienda, ventas, facturación" />
    <meta name="author" content="Boutique POS" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="Spanish" />
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Sistema POS Boutique | Software de Punto de Venta" />
    <meta property="og:description" content="Gestiona tu boutique de ropa con nuestro sistema POS profesional. Inventario, ventas y reportes en un solo lugar." />
    <meta property="og:url" content="https://cyberpiezas.com" />
    <meta property="og:site_name" content="Boutique POS" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sistema POS Boutique" />
    <meta name="twitter:description" content="Software de punto de venta para boutiques de ropa" />
    
    <!-- Canonical -->
    <link rel="canonical" href="https://cyberpiezas.com" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/favicon-512.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Boutique POS",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web",
        "inLanguage": "es-MX",
        "url": "https://cyberpiezas.com",
        "description": "Sistema POS profesional para boutiques de ropa con inventario, ventas, reportes, usuarios y suscripciones.",
        "offers": [
          {
            "@type": "Offer",
            "name": "Plan Básico",
            "price": "99",
            "priceCurrency": "MXN"
          },
          {
            "@type": "Offer",
            "name": "Plan Profesional",
            "price": "299",
            "priceCurrency": "MXN"
          },
          {
            "@type": "Offer",
            "name": "Plan Premium",
            "price": "800",
            "priceCurrency": "MXN"
          },
          {
            "@type": "Offer",
            "name": "Licencia Permanente",
            "price": "7000",
            "priceCurrency": "MXN"
          }
        ]
      }
    </script>
    
    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
